<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowfont - Font Testing Lab</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&family=Sarabun:wght@300;400;700&family=Mitr:wght@300;400&family=Chakra+Petch:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        /* --- แก้ไขเฉพาะ CSS เพื่อปรับโทนสีและ Layout --- */
        body {
            background-color: #fff0f3; /* ชมพูพาสเทล */
            color: #5d4a4a;
            padding: 40px;
            line-height: 1.6;
            font-family: 'Kanit', sans-serif;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
        }

        /* โครงสร้าง header */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: #ff85a2; margin-top: 10px; }
        .subtitle { color: #ffb6c1; margin-bottom: 20px; }

        /* ส่วน Badges (ปุ่มกลมเล็กๆ ด้านบน) */
        .badges-wrapper {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .badge-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ffc0cb;
        }

        /* Status Bar (แถบเช็คคิวงาน) */
        .status-container {
            background: #fff5f7;
            border: 1px solid #ffe1e6;
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        .status-active {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ff4d6d;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #ff4d6d;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* ปุ่มเช็คคิวงานแบบเส้นประ */
        .btn-dashed-queue {
            width: 100%;
            background: transparent;
            border: 2px dashed #ffb6c1;
            color: #ff85a2;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 35px;
            font-family: 'Kanit', sans-serif;
        }
        .btn-dashed-queue:hover {
            background: #fff0f3;
            border-style: solid;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        /* คงโครงสร้าง Section เดิมไว้ */
        .font-section {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #ffd1dc;
        }

        .label {
            display: inline-block;
            background: #ff85a2;
            color: white;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .font-kanit { font-family: 'Kanit', sans-serif; }
        .font-sarabun { font-family: 'Sarabun', sans-serif; }
        .font-mitr { font-family: 'Mitr', sans-serif; }
        .font-chakra { font-family: 'Chakra Petch', sans-serif; }

        .sample-text {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .alphabet-soup {
            font-size: 0.9rem;
            color: #ffb6c1;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="badges-wrapper">
            <div class="badge-dot"></div>
            <div class="badge-dot" style="background-color: #ffdae0;"></div>
            <div class="badge-dot" style="background-color: #ffeef1;"></div>
        </div>
        
        <h1>Meowfont 🐾</h1>
        <p class="subtitle" style="text-align: center;">ทดลองฟอนต์ได้เลยนะคะ</p>
    </header>

    <div class="status-container">
        <div class="status-active">
            <div class="pulse-dot
